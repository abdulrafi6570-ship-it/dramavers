openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Twixtor Archive API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dramas
  - name: actors
  - name: videos
  - name: favorites
  - name: bookmarks
  - name: downloads
  - name: comments
  - name: requests
  - name: admin
  - name: storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/verify-code:
    post:
      operationId: verifyAccessCode
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessCodeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /dramas:
    get:
      operationId: listDramas
      tags: [dramas]
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: genre
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DramaListResponse"
    post:
      operationId: createDrama
      tags: [dramas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DramaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drama"

  /dramas/{id}:
    get:
      operationId: getDrama
      tags: [dramas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DramaDetail"
    patch:
      operationId: updateDrama
      tags: [dramas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DramaUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drama"
    delete:
      operationId: deleteDrama
      tags: [dramas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /dramas/{id}/actors:
    post:
      operationId: addDramaActor
      tags: [dramas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DramaActorInput"
      responses:
        "200":
          description: OK
    delete:
      operationId: removeDramaActor
      tags: [dramas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DramaActorInput"
      responses:
        "204":
          description: Removed

  /actors:
    get:
      operationId: listActors
      tags: [actors]
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: dramaId
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema:
            type: string
            enum: [drama, solo]
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorListResponse"
    post:
      operationId: createActor
      tags: [actors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Actor"

  /actors/{id}:
    get:
      operationId: getActor
      tags: [actors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorDetail"
    patch:
      operationId: updateActor
      tags: [actors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActorUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Actor"
    delete:
      operationId: deleteActor
      tags: [actors]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      parameters:
        - name: dramaId
          in: query
          schema: { type: integer }
        - name: actorId
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema:
            type: string
            enum: [slomo, non_slomo]
        - name: resolution
          in: query
          schema: { type: string }
        - name: fps
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
        - name: tags
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
    post:
      operationId: createVideo
      tags: [videos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /videos/{id}:
    get:
      operationId: getVideo
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoDetail"
    patch:
      operationId: updateVideo
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
    delete:
      operationId: deleteVideo
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /videos/{id}/view:
    post:
      operationId: recordView
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /videos/{id}/download:
    post:
      operationId: downloadVideo
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"

  /videos/{id}/rate:
    post:
      operationId: rateVideo
      tags: [videos]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: OK

  /videos/bulk:
    patch:
      operationId: bulkUpdateVideos
      tags: [videos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkVideoUpdate"
      responses:
        "200":
          description: OK

  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /favorites/{videoId}:
    post:
      operationId: addFavorite
      tags: [favorites]
      parameters:
        - name: videoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      operationId: removeFavorite
      tags: [favorites]
      parameters:
        - name: videoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: OK

  /bookmarks:
    get:
      operationId: listBookmarks
      tags: [bookmarks]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /bookmarks/{videoId}:
    post:
      operationId: addBookmark
      tags: [bookmarks]
      parameters:
        - name: videoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      operationId: removeBookmark
      tags: [bookmarks]
      parameters:
        - name: videoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: OK

  /downloads:
    get:
      operationId: listDownloads
      tags: [downloads]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"

  /comments:
    get:
      operationId: listComments
      tags: [comments]
      parameters:
        - name: videoId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentRequest"
    post:
      operationId: createRequest
      tags: [requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequest"

  /requests/{id}:
    patch:
      operationId: updateRequest
      tags: [requests]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequest"

  /home:
    get:
      operationId: getHome
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeData"

  /search:
    get:
      operationId: getSearchSuggestions
      tags: [admin]
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/access-codes:
    get:
      operationId: listAccessCodes
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessCode"
    post:
      operationId: createAccessCode
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessCodeCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessCode"

  /admin/access-codes/{id}:
    delete:
      operationId: deleteAccessCode
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /ads/active:
    get:
      operationId: getActiveAd
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"

  /ads:
    get:
      operationId: listAds
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ad"
    post:
      operationId: createAd
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"

  /ads/{id}:
    patch:
      operationId: updateAd
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ad"
    delete:
      operationId: deleteAd
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /settings/{key}:
    get:
      operationId: getSetting
      tags: [admin]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"
    put:
      operationId: setSetting
      tags: [admin]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    RegisterInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        email: { type: ["string", "null"] }

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AccessCodeInput:
      type: object
      required: [code]
      properties:
        code: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role]
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: ["string", "null"] }
        role: { type: string }
        isVerified: { type: boolean }
        createdAt: { type: string }

    Drama:
      type: object
      required: [id, name, category]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        genre: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        posterUrl: { type: ["string", "null"] }
        videoCount: { type: integer }
        createdAt: { type: string }

    DramaDetail:
      type: object
      required: [id, name, category]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        genre: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        posterUrl: { type: ["string", "null"] }
        videoCount: { type: integer }
        createdAt: { type: string }
        actors:
          type: array
          items:
            $ref: "#/components/schemas/Actor"
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"

    DramaListResponse:
      type: object
      required: [dramas, total, page, limit]
      properties:
        dramas:
          type: array
          items:
            $ref: "#/components/schemas/Drama"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    DramaInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        category: { type: string }
        genre: { type: string }
        description: { type: string }
        posterUrl: { type: string }

    DramaUpdate:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        genre: { type: string }
        description: { type: string }
        posterUrl: { type: string }

    DramaActorInput:
      type: object
      required: [actorId]
      properties:
        actorId: { type: integer }

    Actor:
      type: object
      required: [id, name, type]
      properties:
        id: { type: integer }
        name: { type: string }
        photoUrl: { type: ["string", "null"] }
        type: { type: string, enum: [drama, solo] }
        bio: { type: ["string", "null"] }
        videoCount: { type: integer }
        createdAt: { type: string }

    ActorDetail:
      type: object
      required: [id, name, type]
      properties:
        id: { type: integer }
        name: { type: string }
        photoUrl: { type: ["string", "null"] }
        type: { type: string, enum: [drama, solo] }
        bio: { type: ["string", "null"] }
        videoCount: { type: integer }
        createdAt: { type: string }
        dramas:
          type: array
          items:
            $ref: "#/components/schemas/Drama"
        videos:
          type: array
          items:
            $ref: "#/components/schemas/Video"

    ActorListResponse:
      type: object
      required: [actors, total, page, limit]
      properties:
        actors:
          type: array
          items:
            $ref: "#/components/schemas/Actor"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    ActorInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        photoUrl: { type: string }
        type: { type: string, enum: [drama, solo] }
        bio: { type: string }

    ActorUpdate:
      type: object
      properties:
        name: { type: string }
        photoUrl: { type: string }
        type: { type: string, enum: [drama, solo] }
        bio: { type: string }

    Video:
      type: object
      required: [id, title, type, status]
      properties:
        id: { type: integer }
        title: { type: string }
        dramaId: { type: ["integer", "null"] }
        actorId: { type: ["integer", "null"] }
        dramaName: { type: ["string", "null"] }
        actorName: { type: ["string", "null"] }
        episode: { type: ["string", "null"] }
        scene: { type: ["string", "null"] }
        videoUrl: { type: ["string", "null"] }
        thumbnailUrl: { type: ["string", "null"] }
        type: { type: string }
        status: { type: string }
        resolution: { type: ["string", "null"] }
        fps: { type: ["integer", "null"] }
